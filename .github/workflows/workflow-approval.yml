name: Automatic Approve Workflow

on:
  workflow_dispatch:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  automatic-approve:
    name: Approve Workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        id: app-token
        with:
          app-id: ${{ secrets.DEVSY_GITHUB_APP_ID }}
          private-key: ${{ secrets.DEVSY_GITHUB_APP_PRIVATE_KEY }}

      - uses: mheap/automatic-approve-action@851272ecb1e93d215b9ab3c16278d434a4fd775b # v1
        with:
          token: ${{ steps.app-token.outputs.token }}
          workflows: "commit.yaml,lint.yaml,pre-commit.yaml"
